services:
  - type: web
    name: bob-pr-monitor
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: PUBLIC_BASE_URL
        value: https://bob-7ae2.onrender.com
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,https://bob-7ae2.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: bob-db
          property: connectionString
      - key: SCAN_INTERVAL
        value: "300"

databases:
  - name: bob-db
    plan: free
