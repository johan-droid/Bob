services:
  - type: web
    name: bob-pr-monitor
    runtime: python
    buildCommand: npm ci && NEXT_OUTPUT_EXPORT=1 npm run build && pip install -r requirements.txt
    startCommand: cd backend && gunicorn -b 0.0.0.0:$PORT --worker-class eventlet -w 1 api_server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PUBLIC_BASE_URL
        value: https://bob-7ae2.onrender.com
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5000,https://bob-7ae2.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: bob-db
          property: connectionString
      - key: SESSION_TYPE
        value: sqlalchemy
      - key: FLASK_ENV
        value: production

databases:
  - name: bob-db
    plan: free
