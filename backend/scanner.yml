name: "Bob PR Health Scanner"

on:
  schedule:
    - cron: "0 * * * *" # Run hourly
  workflow_dispatch:
    inputs:
      repo:
        description: "Scan a specific repository (e.g. owner/repo). If blank, scans all repositories."
        required: false
        type: string

jobs:
  run-scanner:
    name: Execute PR Health Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run PR Health Scanner
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT || secrets.GITHUB_TOKEN }}
          TARGET_REPOS: ${{ inputs.repo || secrets.TARGET_REPOS }}
          ASSIGNEE_USERNAME: ${{ secrets.ASSIGNEE_USERNAME || 'jules' }}
        run: |
          # Use ORG_PAT if available, else default GITHUB_TOKEN
          export GITHUB_TOKEN="${{ secrets.ORG_PAT || secrets.GITHUB_TOKEN }}"
          python backend/pr_health_scanner.py
