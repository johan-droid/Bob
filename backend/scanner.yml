name: "Multi-Repo PR Health Scanner"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Scan a specific repository"
        required: false

jobs:
  scan-all-repos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: 
          - org/repo-alpha
          - org/repo-beta
          - org/repo-gamma
      fail-fast: false
    
    steps:
      - name: "Checkout organization tools"
        uses: actions/checkout@v4
      
      - name: "1. Merge conflict detection"
        uses: prince-chrismc/label-merge-conflicts-action@v3
        with:
          conflict_label_name: "needs-fix"
          github_token: ${{ secrets.ORG_PAT }}
          max_retries: 5
          wait_ms: 3000
          conflict_comment: |
            🚨 @jules-google-lab merge conflict detected.
            Branch `${{ github.head_ref }}` conflicts with base.
            Please resolve: ${{ github.event.pull_request.html_url }}
      
      - name: "2. Actions failure scan"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_PAT }}
          script: |
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: "failure",
              per_page: 5
            });
            for (const run of runs.data.workflow_runs) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ Workflow "${run.name}" failed on ${run.head_branch}`,
                body: `@jules-google-lab please investigate: ${run.html_url}`,
                labels: ["needs-fix", "ci-failure"]
              });
            }
      
      - name: "3. Semantic conflict detection"
        uses: Rosentic/rosentic-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: audit
      
      - name: "4. AI code review"
        if: github.event_name == 'pull_request'
        uses: qodo-ai/pr-agent@v0.30
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openai_key: ${{ secrets.OPENAI_KEY }}
          command: "/review"
