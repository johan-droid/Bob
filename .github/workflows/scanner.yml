name: "Bob PR Health Scanner"

on:
  schedule:
    - cron: "0 * * * *" # Run hourly
  workflow_dispatch:
    inputs:
      repo:
        description: "Scan a specific repository (e.g. owner/repo). If blank, scans all repositories."
        required: false
        type: string

jobs:
  run-scanner:
    name: Execute PR Health Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci

      - name: Run PR Health Scanner
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT || secrets.GITHUB_TOKEN }}
          TARGET_REPOS: ${{ inputs.repo || secrets.TARGET_REPOS }}
          ASSIGNEE_USERNAME: ${{ secrets.ASSIGNEE_USERNAME || 'jules' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          node scripts/scan.js
