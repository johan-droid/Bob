<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Settings — Bob</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='settings.css') }}">
</head>
<body>
<nav class="s-nav">
  <a href="/dashboard" class="s-nav-back">← Dashboard</a>
  <span class="s-nav-title">⚙️ Settings</span>
  <img src="{{ user.avatar }}" class="s-nav-avatar" alt="">
</nav>

<div class="s-container">
  <div id="toast-container" class="s-toasts"></div>

  <section class="s-card">
    <h2 class="s-card-title">🔔 Notifications</h2>
    <label class="s-toggle-row">
      <span class="s-label">In-app notifications</span>
      <label class="s-toggle">
        <input type="checkbox" id="notify-in-app">
        <span class="s-slider"></span>
      </label>
    </label>
    <label class="s-toggle-row">
      <span class="s-label">Browser push notifications</span>
      <label class="s-toggle">
        <input type="checkbox" id="notify-push" onchange="handlePushToggle(this)">
        <span class="s-slider"></span>
      </label>
    </label>
    <p class="s-hint">Push notifications appear even when Bob is in the background.</p>
  </section>

  <section class="s-card">
    <h2 class="s-card-title">⏱ Scan Interval</h2>
    <div class="s-row">
      <label class="s-label">Background scan every</label>
      <select id="scan-interval" class="s-select">
        <option value="60">1 minute</option>
        <option value="180">3 minutes</option>
        <option value="300" selected>5 minutes</option>
        <option value="600">10 minutes</option>
        <option value="900">15 minutes</option>
        <option value="1800">30 minutes</option>
      </select>
    </div>
  </section>

  <section class="s-card">
    <h2 class="s-card-title">🚫 Excluded Repositories</h2>
    <p class="s-hint">These repos will be skipped during scanning.</p>
    <div id="excluded-list" class="s-excluded-list"></div>
    <div class="s-row" style="margin-top:10px">
      <input type="text" id="excluded-input" class="s-input" placeholder="owner/repo-name">
      <button class="s-btn" onclick="addExcluded()">+ Add</button>
    </div>
  </section>

  <section class="s-card">
    <h2 class="s-card-title">👤 Account</h2>
    <div class="s-profile-row">
      <img src="{{ user.avatar }}" class="s-big-avatar" alt="">
      <div>
        <div class="s-profile-name">{{ user.name }}</div>
        <div class="s-profile-user">@{{ user.username }}</div>
        <div class="s-profile-email">{{ user.email or '' }}</div>
      </div>
    </div>
    <a href="/logout" class="s-btn s-btn-danger" style="margin-top:16px;display:inline-flex">Sign Out</a>
  </section>

  <div class="s-actions">
    <button class="s-btn s-btn-primary" onclick="saveSettings()">Save Settings</button>
    <a href="/dashboard" class="s-btn">Cancel</a>
  </div>
</div>

<script src="{{ url_for('static', filename='settings.js') }}"></script>
</body>
</html>
