<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Bob — PR Health Dashboard</title>
    <meta name="description" content="Real-time PR health monitoring across all your GitHub repositories.">
    <meta property="og:title" content="Bob — PR Health Dashboard">
    <meta property="og:description" content="Zero-config GitHub PR health monitoring with real-time alerts.">
    <meta name="theme-color" content="#080c14">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-brand">
        <span class="nav-logo">🤖</span>
        <span class="nav-title">Bob</span>
        <span class="nav-badge">PR Health</span>
    </div>
    <div class="nav-controls">
        <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="search-input" placeholder="Search repos or PRs…" class="search-input">
        </div>
        <select id="repo-filter" class="repo-filter">
            <option value="">All Repos</option>
        </select>
        <select id="type-filter" class="repo-filter">
            <option value="">All Types</option>
            <option value="merge_conflict">Merge Conflicts</option>
            <option value="ci_failure">CI Failures</option>
        </select>
        <div id="ws-status" class="ws-status disconnected" title="WebSocket status">
            <span class="ws-dot"></span>
            <span class="ws-label">Connecting…</span>
        </div>
    </div>
    <div class="nav-user">
        <a href="/settings" class="nav-icon-btn" title="Settings">⚙️</a>
        <img src="{{ user.avatar }}" alt="{{ user.name }}" class="nav-avatar" id="nav-avatar">
        <span class="nav-username">{{ user.name }}</span>
        <a href="/logout" class="nav-logout">Sign out</a>
    </div>
</nav>

<div class="dash-container">
    <!-- Stats row -->
    <div class="stats-row">
        <div class="stat-card stat-pending">
            <div class="stat-num" id="stat-pending">0</div>
            <div class="stat-lbl">🔴 Pending</div>
        </div>
        <div class="stat-card stat-progress">
            <div class="stat-num" id="stat-in-progress">0</div>
            <div class="stat-lbl">🟡 In Progress</div>
        </div>
        <div class="stat-card stat-failed">
            <div class="stat-num" id="stat-failed">0</div>
            <div class="stat-lbl">⛔ Failed</div>
        </div>
        <div class="stat-card stat-resolved">
            <div class="stat-num" id="stat-resolved">0</div>
            <div class="stat-lbl">✅ Resolved</div>
        </div>
        <div class="stat-card stat-total">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-lbl">📊 Total</div>
        </div>
    </div>

    <!-- Main panel -->
    <div class="dash-panels">
        <!-- Repositories panel -->
        <section class="panel" id="panel-repos">
            <div class="panel-header">
                <h2 class="panel-title">📦 Active Repositories</h2>
                <span id="repo-count-badge" class="repo-badge">0</span>
            </div>
            <div id="repo-list" class="pr-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 15px;">
                <div class="pr-loading">Loading repositories…</div>
            </div>
        </section>

        <!-- Active issues panel -->
        <section class="panel" id="panel-active">
            <div class="panel-header">
                <h2 class="panel-title">🔴 Active Issues</h2>
                <button class="panel-refresh-btn" onclick="requestUpdate()" title="Refresh">↻</button>
            </div>
            <div id="active-prs" class="pr-list"><div class="pr-loading">Loading…</div></div>
        </section>

        <section class="panel" id="panel-progress">
            <div class="panel-header">
                <h2 class="panel-title">🟡 In Progress</h2>
            </div>
            <div id="in-progress-prs" class="pr-list"><div class="pr-loading">Loading…</div></div>
        </section>

        <section class="panel" id="panel-failed">
            <div class="panel-header">
                <h2 class="panel-title">⛔ Failed</h2>
            </div>
            <div id="failed-prs" class="pr-list"><div class="pr-loading">Loading…</div></div>
        </section>

        <section class="panel" id="panel-resolved">
            <div class="panel-header">
                <h2 class="panel-title">✅ Resolved</h2>
            </div>
            <div id="history-prs" class="pr-list"><div class="pr-loading">Loading…</div></div>
        </section>
    </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
