<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — Bob</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#080c14;--surface:#0f1623;--border:rgba(255,255,255,.07);--text:#e8edf5;--text2:#8b95a8;--danger:#ef4444;--accent2:#818cf8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
    .wrap{max-width:480px}
    .icon{font-size:72px;margin-bottom:24px;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    h1{font-size:28px;font-weight:700;margin-bottom:10px;color:var(--text)}
    p{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:28px}
    .msg{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--danger);margin-bottom:24px;display:none}
    .btn{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;transition:all .2s}
    .btn:hover{border-color:var(--accent2);color:var(--accent2)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">⚠️</div>
    <h1 id="err-title">Something went wrong</h1>
    <p id="err-desc">An unexpected error occurred. Please try again or go back to the home page.</p>
    <div class="msg" id="err-msg"></div>
    <a href="/" class="btn">← Go Home</a>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    const msgs = {
      invalid_state:'OAuth security check failed. This could be a CSRF attempt. Please try logging in again.',
      no_code:'GitHub did not return an authorization code.',
      no_token:'Failed to exchange OAuth token. Check your GitHub OAuth app configuration.',
      user_fetch_failed:'Could not fetch your GitHub profile. Your token may have expired.',
    };
    const key = p.get('error');
    if(key){ const m = document.getElementById('err-msg'); m.textContent = msgs[key]||key; m.style.display='block'; }
    const t = p.get('title'); if(t) document.getElementById('err-title').textContent = t;
    const d = p.get('desc');  if(d) document.getElementById('err-desc').textContent = d;
  </script>
</body>
</html>
