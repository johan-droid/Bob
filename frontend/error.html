<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error - Bob</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/components.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      background:
        radial-gradient(circle at top left, var(--danger-muted), transparent 28%),
        radial-gradient(circle at bottom right, var(--accent-muted), transparent 24%),
        var(--bg);
    }
    .wrap {
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }
    .icon {
      font-size: 72px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    p {
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .msg {
      display: none;
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      background: var(--danger-muted);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card wrap">
    <div class="icon">⚠️</div>
    <h1 id="err-title">Something went wrong</h1>
    <p id="err-desc">An unexpected error occurred. Please try again or go back to the home page.</p>
    <div class="msg" id="err-msg"></div>
    <a href="/" class="btn btn-outline">Go Home</a>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    const msgs = {
      invalid_state: 'OAuth security check failed. This could be a CSRF attempt. Please try logging in again.',
      no_code: 'GitHub did not return an authorization code.',
      no_token: 'Failed to exchange OAuth token. Check your GitHub OAuth app configuration.',
      user_fetch_failed: 'Could not fetch your GitHub profile. Your token may have expired.',
    };
    const key = p.get('error');
    if (key) {
      const m = document.getElementById('err-msg');
      m.textContent = msgs[key] || key;
      m.style.display = 'block';
    }
    const t = p.get('title');
    if (t) document.getElementById('err-title').textContent = t;
    const d = p.get('desc');
    if (d) document.getElementById('err-desc').textContent = d;
  </script>
</body>
</html>
