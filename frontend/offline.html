<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Bob</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/tokens.css">
    <link rel="stylesheet" href="/components.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            background:
                radial-gradient(circle at top left, var(--accent-muted), transparent 28%),
                radial-gradient(circle at bottom right, var(--warning-muted), transparent 24%),
                var(--bg);
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            max-width: 480px;
        }
        h1 {
            font-size: clamp(2.4rem, 4vw, 3rem);
            color: var(--accent-text);
        }
        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card container">
        <h1>Bob is Offline</h1>
        <p>It seems you've lost your connection. Check your network and try again.</p>
        <a href="/" class="btn btn-primary">Retry Connection</a>
    </div>
</body>
</html>
