<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Bob</title>
    <style>
        body {
            background: #080c14;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; color: #3b82f6; }
        p { color: #94a3b8; font-size: 1.2rem; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bob is Offline</h1>
        <p>It seems you've lost your connection. Check your network and try again.</p>
        <a href="/" class="btn">Retry Connection</a>
    </div>
</body>
</html>
